services:
  backend:
    container_name: nps_backend
    build: .
    restart: always
    depends_on:
      ncanode:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  ncanode:
    image: malikzh/ncanode:latest
    container_name: ncanode_worker
    restart: always
    ports:
      - "14579:14579"
    environment:
      - TZ=Asia/Almaty
    volumes:
      - ncanode_cache:/app/cache
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 14579 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  ncanode_cache:
